    <rect x="14" y="172" height="16" fill="#55ffff" class="pbar" width="0"/>
    <text x="428" y="184" font-size="10" fill="#0000aa" text-anchor="middle" font-weight="bold">░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ 100%</text>
