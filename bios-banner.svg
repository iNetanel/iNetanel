  <g class="l3"><text x="14" y="82" font-size="12" fill="#55ffff">[ OK ]</text><text x="76" y="82" font-size="12" fill="#55ffff">Startup mentor daemon....... </text><text x="410" y="82" font-size="12" fill="#ffffff">RUNNING — ADVISORS LOADED</text></g>
  <g class="l4"><text x="14" y="98" font-size="12" fill="#55ffff">[ OK ]</text><text x="76" y="98" font-size="12" fill="#55ffff">Open source stack........... </text><text x="410" y="98" font-size="12" fill="#ffffff">Python / JS / TS / Node / React</text></g>
  <g class="l5"><text x="14" y="114" font-size="12" fill="#ffff55">[ -- ]</text><text x="76" y="114" font-size="12" fill="#55ffff">Coffee module............... </text><text x="410" y="114" font-size="12" fill="#ffff55">CRITICAL — RESERVES LOW</text></g>
