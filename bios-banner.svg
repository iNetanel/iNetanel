<svg xmlns="http://www.w3.org/2000/svg" width="860" height="278" viewBox="0 0 860 278">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono');
      text { font-family: 'Share Tech Mono', 'Courier New', monospace; }
      .l1{animation:show .01s .2s both}
      .l2{animation:show .01s .6s both}
      .l3{animation:show .01s 1.0s both}
      .l4{animation:show .01s 1.4s both}
      .l5{animation:show .01s 1.8s both}
      .l6{animation:show .01s 2.2s both}
      .l7{animation:show .01s 2.6s both}
      .prog{animation:show .01s 2.9s both}
      .pbar{animation:fill 2s 3.1s cubic-bezier(.4,0,.2,1) both}
      .main{animation:show .01s 5.3s both}
      .m2{animation:show .01s 5.45s both}
      .m3{animation:show .01s 5.6s both}
      .m4{animation:show .01s 5.75s both}
      .cur{animation:blink 1s step-end infinite 6.0s both}
      @keyframes show{from{opacity:0}to{opacity:1}}
      @keyframes fill{from{width:0}to{width:828px}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    </style>
    <pattern id="scan" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="860" height="2" fill="transparent"/>
      <rect y="2" width="860" height="2" fill="black" fill-opacity=".07"/>
    </pattern>
  </defs>

  <rect width="860" height="278" fill="#0000aa"/>
  <rect width="860" height="28" fill="#aaaaaa"/>
