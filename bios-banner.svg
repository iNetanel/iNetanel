  <g class="m2"><text x="14" y="248" font-size="13" fill="#ffff55">// AI Expert  ·  Startup Mentor  ·  Advisor  ·  UK &amp; Global</text></g>
  <g class="m3"><text x="14" y="264" font-size="11" fill="#aaaaaa">Infusing life's vibrance into technological craft — pushing boundaries before they hit the market.</text></g>
  <g class="m4"><text x="14" y="278" font-size="11" fill="#55ffff">[ F2 ] Skills   [ F3 ] Articles   [ F4 ] Life Map   [ F5 ] About   [ F6 ] Projects   [ F8 ] Contact</text></g>

  <rect width="860" height="278" fill="url(#scan)"/>
</svg>
